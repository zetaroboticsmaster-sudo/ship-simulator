<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>선진입계산기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{--bg:#091422;--p1:#0d1a2e;--p2:#12243d;--p3:#182e4e;--bd:#1e3a60;--w:#ff6b6b;--c:#00e5a0;--b:#4ecdc4;--e:#ffd93d;--wa:#ff9f43;--t:#dfe8f3;--d:#6088b0;--d2:#405a78;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);height:100vh;height:100dvh;display:grid;overflow:hidden}

/* ===== DESKTOP: grid 3 rows ===== */
body{grid-template-rows:auto 1fr auto}

/* ===== HEADER ===== */
.hd{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--p1);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.hd h1{font-size:1rem;font-weight:900;color:var(--e);white-space:nowrap}
.hd-r{display:flex;align-items:center;gap:5px;margin-left:auto;flex-wrap:wrap}
.hd-r label{font-size:.75rem;color:var(--d)}
.hd-r input,.hd-r select{padding:3px 5px;background:var(--p2);border:1px solid var(--bd);border-radius:4px;color:var(--t);font-family:'IBM Plex Mono';font-size:.8rem;outline:none}
.hd-r select{max-width:120px}
.btn{padding:6px 12px;border:none;border-radius:5px;color:#000;font-size:.8rem;cursor:pointer;font-family:'Noto Sans KR';font-weight:700;background:var(--e);min-height:36px}
.btn:active{filter:brightness(.85)}
.btn:disabled{opacity:.4}
.btn-st{font-size:.65rem;color:var(--d)}
.hd .time-r{display:flex;align-items:center;gap:2px}
.hd .time-r input{width:36px;text-align:center}

/* ===== MAIN ===== */
.main{display:flex;overflow:hidden;position:relative}
#map{flex:1}
.sb{width:340px;flex-shrink:0;background:var(--p1);border-left:1px solid var(--bd);overflow-y:auto}

/* ===== SIDEBAR ===== */
.sec{padding:7px 9px;border-bottom:1px solid var(--bd)}
.sec-t{font-size:.8rem;font-weight:700;color:var(--d);margin-bottom:4px}
.row{display:flex;gap:3px;align-items:center;margin-bottom:3px}
.row label{font-size:.85rem;color:var(--d);min-width:38px}
.row input,.row select{flex:1;padding:4px 5px;background:var(--p2);border:1px solid var(--bd);border-radius:4px;color:var(--t);font-family:'IBM Plex Mono';font-size:.95rem;outline:none;min-height:32px}
.row .u{font-size:.7rem;color:var(--d2)}
.chips{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px}
.chip{padding:4px 8px;background:var(--p2);border:1px solid var(--bd);border-radius:3px;color:var(--d);font-size:.7rem;cursor:pointer;min-height:28px;display:flex;align-items:center}
.chip:active{border-color:var(--b);color:var(--t)}
.live{display:flex;gap:2px;margin-top:3px}
.live-c{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:3px 4px;text-align:center}
.live-c .ll{font-size:.5rem;color:var(--d2)}
.live-c .lv{font-family:'IBM Plex Mono';font-size:.8rem;font-weight:600}
.tide{padding:7px 9px;background:rgba(0,229,160,.03);border-bottom:1px solid var(--bd)}
.tide .tr{display:flex;justify-content:space-between;font-size:.85rem;color:var(--d);margin:2px 0}
.tide .tv{font-family:'IBM Plex Mono';font-weight:600;font-size:.85rem}
.tide .k{color:var(--c)}.tide .co{color:var(--wa)}
.tide .note{font-size:.7rem;color:var(--d2);margin-top:2px}
canvas#cmp{width:100%;max-width:180px;aspect-ratio:1;display:block;margin:0 auto}
.r-big{text-align:center;padding:6px;background:var(--p2);border:2px solid var(--e);border-radius:5px;margin-bottom:4px}
.r-big .rv{font-family:'IBM Plex Mono';font-size:1.2rem;font-weight:700;color:var(--e)}
.r-big .rs{font-size:.75rem;color:var(--d);margin-top:1px}
.r-row{display:flex;gap:2px}
.r-c{flex:1;background:var(--p2);border:1px solid var(--bd);border-radius:3px;padding:3px;text-align:center}
.r-c .rl{font-size:.55rem;color:var(--d2)}
.r-c .rv{font-family:'IBM Plex Mono';font-size:.9rem;font-weight:600;margin-top:1px}
.tl-sum{padding:7px 9px;border-bottom:1px solid var(--bd);background:rgba(255,217,61,.02)}
.tl-sum .sec-t{color:var(--e)}
.tl-grid{display:flex;gap:1px;margin-bottom:3px;overflow-x:auto}
.tl-item{min-width:26px;flex-shrink:0;border-radius:2px;padding:2px 1px;text-align:center;font-size:.5rem;font-weight:700;cursor:pointer}
.tl-item .tl-h{font-family:'IBM Plex Mono';font-size:.65rem}
.tl-item .tl-e{font-size:.55rem}
.tl-item.sel{outline:2px solid #fff;outline-offset:-1px}
.tl-item.slack{border:2px solid var(--wa)}
.tl-item.slack-zone{border-bottom:3px solid #ff9f43;position:relative}
.tl-item.slack-zone::after{content:'⚡';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:.45rem}
.best-box{background:var(--p2);border:1px solid var(--c);border-radius:4px;padding:5px 7px;margin-top:3px}
.best-box .bb-t{font-size:.65rem;color:var(--c);font-weight:700}
.best-box .bb-v{font-size:.85rem;font-weight:700;color:var(--e);margin-top:1px}
.best-box .bb-d{font-size:.7rem;color:var(--d);margin-top:1px}

/* MAP OVERLAYS */
.map-phase{position:absolute;top:8px;left:55px;z-index:800;background:rgba(13,26,46,.92);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;pointer-events:none}
.map-phase .mp-phase{font-size:1rem;font-weight:800}
.map-phase .mp-time{font-family:'IBM Plex Mono';font-size:.8rem;color:var(--d)}
.map-phase .mp-slack{font-size:.8rem;color:var(--wa);font-weight:700}
.m-hint{position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:800;background:rgba(13,26,46,.92);border:1px solid var(--bd);border-radius:5px;padding:5px 12px;font-size:.8rem;color:var(--e);pointer-events:none;transition:opacity .3s;white-space:nowrap}
.m-hint.off{opacity:0}
.m-leg{position:absolute;bottom:6px;left:6px;z-index:800;background:rgba(13,26,46,.88);border:1px solid var(--bd);border-radius:4px;padding:4px 6px;font-size:.65rem;color:var(--d);line-height:1.5}
.m-leg div{display:flex;align-items:center;gap:2px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.m-info{position:absolute;top:8px;right:55px;z-index:800;background:rgba(13,26,46,.88);border:1px solid var(--bd);border-radius:4px;padding:3px 6px;font-size:.65rem;color:var(--d);font-family:'IBM Plex Mono'}

/* ===== BOTTOM PLAYER ===== */
.pl{padding:6px 10px;padding-bottom:calc(6px + var(--safe-b));background:var(--p1);border-top:2px solid var(--e)}
.pl-row{display:flex;align-items:center;gap:6px}
.pl-btn{width:44px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--e);border:none;border-radius:5px;color:#000;font-size:1rem;cursor:pointer;flex-shrink:0;font-weight:900}
.pl-btn:active{filter:brightness(.85)}
.spd-btn{padding:4px 7px;background:var(--p2);border:1px solid var(--bd);border-radius:4px;color:var(--d);font-size:.65rem;cursor:pointer;font-family:'IBM Plex Mono';font-weight:600;min-height:28px;display:flex;align-items:center}
.spd-btn.act{background:var(--e);color:#000;font-weight:700;border-color:var(--e)}
.pl-time{font-family:'IBM Plex Mono';font-size:1.1rem;font-weight:700;color:var(--e);min-width:48px;text-align:center}
.pl input[type="range"]{flex:1;-webkit-appearance:none;height:8px;background:var(--p2);border-radius:4px;outline:none}
.pl input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--e);cursor:pointer}

/* ===== MOBILE TABS ===== */
.mob-tabs{display:none;background:var(--p1);border-bottom:1px solid var(--bd)}
.mob-tabs button{flex:1;padding:8px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--d);font-size:.75rem;font-family:'Noto Sans KR';font-weight:600;cursor:pointer}
.mob-tabs button.act{color:var(--e);border-bottom-color:var(--e)}
.tab-content{display:none}
.tab-content.act{display:block}

/* ==============================
   MOBILE (Fold6 closed: 374px)
   ============================== */
@media(max-width:768px){
  body{grid-template-rows:auto auto 1fr auto auto}
  .hd{padding:3px 8px;gap:4px}
  .hd h1{font-size:.9rem}
  .hd-r{width:100%;margin-left:0;gap:4px}
  .hd-r label{font-size:.65rem}
  .hd-r input,.hd-r select{font-size:.75rem;padding:3px 4px}
  .hd-r select{flex:1;max-width:none}
  .btn{padding:5px 10px;font-size:.75rem;min-height:32px}
  .btn-st{font-size:.6rem}
  .time-r input{width:32px!important;font-size:.75rem!important}
  
  .main{flex-direction:column}
  #map{flex:1;min-height:40vh}
  .sb{width:100%;border-left:none;border-top:1px solid var(--bd);max-height:35vh;overflow-y:auto}
  
  .mob-tabs{display:flex}
  .sb>.sec,.sb>.tide,.sb>.tl-sum{display:none}
  .sb>.tab-content.act{display:block}
  
  .sec{padding:6px 8px}
  .sec-t{font-size:.75rem}
  .row label{font-size:.8rem;min-width:34px}
  .row input,.row select{font-size:.85rem;min-height:30px}
  .chip{padding:5px 10px;font-size:.7rem;min-height:30px}
  
  .map-phase{top:6px;left:46px;padding:3px 8px}
  .map-phase .mp-phase{font-size:.85rem}
  .map-phase .mp-time{font-size:.7rem}
  .map-phase .mp-slack{font-size:.7rem}
  .m-hint{top:50px;font-size:.7rem;padding:4px 10px}
  .m-leg{font-size:.58rem;padding:3px 5px}
  .m-info{font-size:.6rem;top:6px;right:46px}
  
  .tl-grid{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tl-item{min-width:24px}
  .best-box .bb-v{font-size:.8rem}
  
  .pl{padding:5px 8px;padding-bottom:calc(5px + var(--safe-b))}
  .pl-btn{width:40px;height:34px;font-size:.9rem}
  .pl-time{font-size:1rem;min-width:44px}
  .pl input[type="range"]::-webkit-slider-thumb{width:22px;height:22px}
  
  canvas#cmp{max-width:160px}
  .r-big .rv{font-size:1.1rem}
  .r-c .rv{font-size:.85rem}
  .live-c .lv{font-size:.75rem}
  .tide .tr{font-size:.8rem}
  .tide .tv{font-size:.8rem}
}

/* Fold6 unfolded inner screen */
@media(min-width:769px) and (max-width:900px){
  .sb{width:320px}
}
</style>
</head>
<body>

<div class="hd">
  <h1>⚓ 선진입계산기</h1>
  <div class="hd-r">
    <label>날짜</label><input type="date" id="inDate">
    <select id="inPt" onchange="onPt()"><option value="">📍 지도 클릭</option><option value="33.38,126.10,330,150,한림항,33.406,126.236,30">한림/비양도</option><option value="33.42,126.18,330,150,애월,33.463,126.327,25">애월</option><option value="33.35,126.03,330,150,신창,33.341,126.018,35">신창</option><option value="33.22,126.51,250,70,서귀포,33.214,126.251,40">서귀포/법환/범섬</option><option value="33.20,126.15,250,70,모슬포,33.214,126.251,35">모슬포</option></select>
    <div class="time-r"><input type="number" id="fishStart" value="6" min="0" max="23">~<input type="number" id="fishEnd" value="18" min="1" max="24">시</div>
    <button class="btn" id="calcBtn" onclick="doCalc()">🔄 계산하기</button>
    <button class="btn" style="background:var(--c)" onclick="getGPS()">📍 내 위치</button>
    <button class="btn" id="trkBtn" style="background:var(--w)" onclick="toggleTrack()">🔴 항적기록</button>
    <button class="btn" id="driftBtn" style="background:var(--d2);display:none" onclick="toggleDrift()">⚓ 풍 넣기</button>
    <button class="btn" style="background:#ff9f43" id="slackBtn" onclick="recordSlack()">🔄 물돌이</button>
    <span class="btn-st" id="gfsSt"></span>
    <span class="btn-st" id="trkSt"></span>
  </div>
</div>

<!-- MOBILE TABS (hidden on desktop) -->
<div class="mob-tabs" id="mobTabs">
  <button class="act" onclick="showTab(0)">📊 결과</button>
  <button onclick="showTab(1)">🌬️ 설정</button>
  <button onclick="showTab(2)">🧭 나침반</button>
</div>

<div class="main">
  <div id="map">
    <div class="map-phase" id="mapPhase"><div class="mp-time" id="mpTime">06:00</div><div class="mp-phase" id="mpPhase" style="color:var(--c)">밀물</div><div class="mp-slack" id="mpSlack"></div></div>
    <div class="m-hint" id="mHint">📍 포인트 선택 → 계산하기</div>
    <div class="m-leg"><div><div class="dot" style="background:var(--c)"></div> 밀물</div><div><div class="dot" style="background:var(--wa)"></div> 물돌이</div><div><div class="dot" style="background:var(--w)"></div> 썰물</div><div style="margin-top:2px;border-top:1px solid var(--bd);padding-top:2px"><span style="color:var(--w)">━</span>바람 <span style="color:var(--c)">━</span>조류 <span style="color:var(--e)">━</span>합성</div></div>
    <div class="m-info" id="mCoord">—</div>
  </div>
  <div class="sb">
    <!-- TAB 0: Results (default on mobile) -->
    <div class="tab-content act" id="tab0">
      <div class="tl-sum"><div class="sec-t">📊 시간대별 진입방향</div><div class="tl-grid" id="tlGrid"></div><div class="best-box"><div class="bb-t">🏆 최적 자리</div><div class="bb-v" id="bestV">[계산하기]를 눌러주세요</div><div class="bb-d" id="bestD"></div></div></div>
      <div class="tide"><div class="sec-t">🌊 조석 보정</div><div class="tr"><span>관측소</span><span class="tv k" id="tS">—</span></div><div class="tr"><span>거리</span><span class="tv k" id="tDist">—</span></div><div class="tr"><span>KHOA 만조</span><span class="tv k" id="tH">—</span></div><div class="tr"><span>🔄 물돌이</span><span class="tv co" id="tCS" style="font-size:1rem">—</span></div><div class="note" id="tWhy">—</div></div>
      <div class="sec"><div class="r-big"><div class="rv" id="xR">—</div><div class="rs" id="xD"></div></div><div class="r-row"><div class="r-c"><div class="rl">이동</div><div class="rv" id="xDir" style="color:var(--e)">—</div></div><div class="r-c"><div class="rl">속도</div><div class="rv" id="xSpd" style="color:var(--c)">—</div></div><div class="r-c"><div class="rl">선수</div><div class="rv" id="xBow" style="color:var(--b)">—</div></div></div></div>
    </div>
    <!-- TAB 1: Settings -->
    <div class="tab-content" id="tab1">
      <div class="sec"><div class="sec-t">🌬️ 바람</div><div class="chips"><button class="chip" onclick="sW(0)">북</button><button class="chip" onclick="sW(315)">북서</button><button class="chip" onclick="sW(270)">서</button><button class="chip" onclick="sW(225)">남서</button><button class="chip" onclick="sW(180)">남</button><button class="chip" onclick="sW(135)">남동</button><button class="chip" onclick="sW(90)">동</button><button class="chip" onclick="sW(45)">북동</button></div><div class="row"><label>풍향</label><input type="number" id="wD" value="315" min="0" max="360"><span class="u">°</span></div><div class="row"><label>풍속</label><input type="number" id="wS" value="5" min="0" max="25" step=".5"><span class="u">m/s</span></div>
      <div class="live"><div class="live-c"><div class="ll">현재 풍향</div><div class="lv" id="lwD" style="color:var(--w)">—</div></div><div class="live-c"><div class="ll">현재 풍속</div><div class="lv" id="lwS" style="color:var(--w)">—</div></div></div></div>
      <div class="sec"><div class="sec-t">🌊 조류</div><div class="row"><label>밀물</label><input type="number" id="fD" value="330" min="0" max="360"><span class="u">°</span></div><div class="row"><label>썰물</label><input type="number" id="eD" value="150" min="0" max="360"><span class="u">°</span></div><div class="row"><label>세기</label><input type="number" id="cM" value="0.8" min="0" max="3" step=".1"><span class="u">kn</span></div>
      <div class="live"><div class="live-c"><div class="ll">현재 유향</div><div class="lv" id="lcD" style="color:var(--c)">—</div></div><div class="live-c"><div class="ll">현재 유속</div><div class="lv" id="lcS" style="color:var(--c)">—</div></div></div></div>
      <div class="sec"><div class="sec-t">⚓ 선박</div><div class="row"><label>풍닻</label><select id="aY"><option value="1">있음</option><option value="0">없음</option></select></div><div class="row"><label>규모</label><select id="aS"><option value=".35">소형(~5t)</option><option value=".50">중형</option><option value=".65" selected>중대형(9.77t)</option><option value=".80">대형</option><option value=".95">초대형</option></select></div></div>
    </div>
    <!-- TAB 2: Compass -->
    <div class="tab-content" id="tab2">
      <div class="sec"><div class="sec-t">🧭 나침반</div><canvas id="cmp" width="200" height="200"></canvas></div>
    </div>
    <!-- Desktop: show all -->
  </div>
</div>

<!-- PLAYER -->
<div class="pl"><div class="pl-row"><div class="pl-btn" id="playB" onclick="togglePlay()">▶</div><div class="pl-time" id="pTime">06:00</div><div class="spd-btn" onclick="setSpeed(1500,this)">x1</div><div class="spd-btn" onclick="setSpeed(600,this)">x2.5</div><div class="spd-btn" onclick="setSpeed(300,this)">x5</div><div class="spd-btn act" onclick="setSpeed(150,this)">x10</div><input type="range" id="pSl" min="0" max="143" value="0" step="1" oninput="tick()"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ===== MOBILE TABS =====
function showTab(n){
  document.querySelectorAll('.mob-tabs button').forEach((b,i)=>b.classList.toggle('act',i===n));
  document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('act',i===n));
}
// Desktop: show all tabs
function checkDesktop(){
  if(window.innerWidth>768){document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('act'));}
  else{const active=document.querySelector('.mob-tabs button.act');if(!active)showTab(0);}
}
window.addEventListener('resize',checkDesktop);

// ===== STATE =====
let M,sMk,tLine,trLine,sMar,vGrp,hMks=[];let pLat=33.38,pLon=126.10,H=[],P=[];let pTm=null,gfs=null;let sN='한림항',sLa=33.406,sLo=126.236,sDepth=30;let fishS=6,fishE=18;let trkActive=false;
const DR=d=>d*Math.PI/180,RD=r=>((r*180/Math.PI)%360+360)%360;
const GC=d=>{const k=['북','북북동','북동','동북동','동','동남동','남동','남남동','남','남남서','남서','서남서','서','서북서','북서','북북서'];return k[Math.round(d/22.5)%16]};
const FM=h=>{const a=Math.floor(h),b=Math.round((h-a)*60);return String(a).padStart(2,'0')+':'+String(b).padStart(2,'0')};
const DK=(a,b,c,d)=>{const R=6371,x=Math.sin(DR(c-a)/2)**2+Math.cos(DR(a))*Math.cos(DR(c))*Math.sin(DR(d-b)/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))};

function initMap(){
  const n=new Date(),d=document.getElementById('inDate');d.value=n.toISOString().slice(0,10);const mn=new Date(n);mn.setDate(mn.getDate()-7);d.min=mn.toISOString().slice(0,10);const mx=new Date(n);mx.setDate(mx.getDate()+7);d.max=mx.toISOString().slice(0,10);
  M=L.map('map',{zoomControl:false}).setView([35.5,127.5],7);

function getMD(date){const base=new Date(2025,0,29),diff=Math.round((new Date(date.getFullYear(),date.getMonth(),date.getDate())-base)/86400000);const ld=((diff%30)+30)%30,md=(ld%15)+1;const ds=Math.min(Math.abs(md-7.5),Math.abs(md-7.5+15),Math.abs(md-7.5-15));const str=Math.max(0,1-ds/7.5);let lb='';if(md>=6&&md<=9)lb='사리';else if(md>=13||md<=2)lb='조금';else if(md>=3&&md<=5)lb='중간↑';else lb='중간↓';return{md,ld,str,lb};}

        if(j.result&&j.result.data&&j.result.data.length>0){

            if(d.tph_type&&d.tph_type.includes('고'))highs.push({h,lv,t:d.tph_time});

          });
          khoaTide={highs,lows,raw:j.result.data};
          if(lows.length>0){

            slackH=closest.h;
          }
          if(highs.length>0&&lows.length>0){
            const maxH=Math.max(...highs.map(h=>h.lv));
            const minL=Math.min(...lows.map(l=>l.lv));
            tideStr=Math.min(1,(maxH-minL)/300);
          }
          document.getElementById('tCS').textContent='🏛️ KHOA('+tc+'): 만조 '+highs.map(h=>h.t).join('/')+' 간조 '+lows.map(l=>l.t).join('/');

function calc(wF,wSp,cD,cSp,aP,hasA){
  // 물리 모델 v4 (2026-04-21 GPX 실측 검증)
  // 선수방향: 풍닻=선수에서 투입 → 조류 반대방향으로 선수 당김
  // 실측: 밀물70°시 선수210°(바람+조류반대 블렌드), 썰물250°시 선수~90°(조류반대 우세)

  // === 1. 선수 방향 (풍닻 견인 + 바람 토크 균형) ===
  let bow;
  const cOpp=(cD+180)%360; // 조류 반대 = 풍닻이 선수를 당기는 방향
  if(!hasA){
    // 풍닻 없음: 바람 or 조류에 밀려 방향 결정
    const wFo=wSp*.1, cFo=cSp*1;
    bow = wFo>cFo*.5 ? (wF+90)%360 : cOpp;
  } else {
    // 풍닻 있음: 선수 = 바람방향과 조류반대방향의 가중 블렌드
    // 조류 강할수록 풍닻 견인력 우세 → 선수가 조류 반대로
    // 조류 약하면 바람이 선수 방향 결정
    const cWeight = Math.min(1, cSp / (cSp + wSp*0.08 + 0.01));
    const wWeight = 1 - cWeight;
    const wR=wF*Math.PI/180, cR=cOpp*Math.PI/180;
    const bx = wWeight*Math.sin(wR) + cWeight*Math.sin(cR);
    const by = wWeight*Math.cos(wR) + cWeight*Math.cos(cR);
    bow = ((Math.atan2(bx,by)*180/Math.PI)%360+360)%360;
  }

  // === 2. 조류 동조 (풍닻 커플링) ===
  const anchorCoupling = hasA ? (0.90 + 0.08 * aP) : 0.15;
  const cE = cSp * anchorCoupling;

  // === 3. 바람 밀림 ===
  const windDragCoeff = hasA ? 0.025 : 0.06;
  const anchorWindReduction = hasA ? (0.3 + 0.4 * aP) : 0;
  const wDr = wSp * windDragCoeff * (1 - anchorWindReduction);

  // === 4. 절대 드리프트 벡터 ===
  const cr=DR(cD), wr=DR((wF+180)%360);
  const cvx=cE*Math.sin(cr), cvy=cE*Math.cos(cr);
  const wvx=wDr*Math.sin(wr), wvy=wDr*Math.cos(wr);
  const rx=cvx+wvx, ry=cvy+wvy;
  const rS=Math.sqrt(rx*rx+ry*ry);
  const rD=RD(Math.atan2(rx,ry));

  // === 5. 진입 방향 = 이동방향 vs 선수 ===
  let eA=((rD-bow)%360+360)%360;
  let eT,em,col,pr;
  if(rS<.01){eT='정조';em='🔄';col='#ff9f43';pr=2;} else if(rS<.05){eT='물돌이';em='🔄';col='#ff9f43';pr=2;}
  else if(eA<=30||eA>=330){eT='선수▲';em='🔥';col='#00e5a0';pr=5;}
  else if(eA>30&&eA<=75){eT='우현선수';em='✅';col='#4ecdc4';pr=4;}
  else if(eA>75&&eA<=105){eT='우현';em='✅';col='#4ecdc4';pr=3;}
  else if(eA>105&&eA<=150){eT='우현선미';em='⚠️';col='#ff9f43';pr=2;}
  else if(eA>150&&eA<=210){eT='선미▼';em='⚠️';col='#ff6b6b';pr=1;}
  else if(eA>210&&eA<=255){eT='좌현선미';em='⚠️';col='#ff9f43';pr=2;}
  else if(eA>255&&eA<=285){eT='좌현';em='✅';col='#4ecdc4';pr=3;}
  else{eT='좌현선수';em='✅';col='#4ecdc4';pr=4;}

  const residualRatio = hasA ? Math.max(0, 1 - anchorCoupling) : 0.85;
  return{bow,rD,rS,eT,em,col,pr,cvx,cvy,wvx,wvy,rx,ry,cE,wDr,cD,cSp,residualRatio};
}

function build(){fishS=+document.getElementById('fishStart').value||6;fishE=+document.getElementById('fishEnd').value||18;const wF=+document.getElementById('wD').value||315,wSp=+document.getElementById('wS').value||5;const flD=+document.getElementById('fD').value||250,ebD=+document.getElementById('eD').value||70;const cMax=+document.getElementById('cM').value||.8;const hasA=document.getElementById('aY').value==='1',aP=+document.getElementById('aS').value||.65;const md=calcCorr();const totalSteps=(fishE-fishS)*6;document.getElementById('pSl').max=totalSteps-1;H=[];

// ===== 조류 전환점 계산 (하루 전체) =====
// 조류는 만조/간조보다 위상차만큼 늦게 전환됨
// 만조 후 + lag → 밀물→썰물 (서→동)
// 간조 후 + lag → 썰물→밀물 (동→서)
const PHASE_LAG=2; // 시간 (4/21 GPX: 간조06:37 → 전환08:30 = 113분 ≈ 2시간)

// 조류 전환점 배열: {h:시각, toDir:전환후방향, toLabel:전환후라벨}
let transitions=[];
if(khoaTide&&khoaTide.highs&&khoaTide.lows){
  // KHOA 조석 데이터로 전환점 계산
  khoaTide.highs.forEach(ht=>{
    transitions.push({h:ht.h+PHASE_LAG, toDir:ebD, toLabel:'썰물'}); // 만조 후 → 썰물
  });
  khoaTide.lows.forEach(lt=>{
    transitions.push({h:lt.h+PHASE_LAG, toDir:flD, toLabel:'밀물'}); // 간조 후 → 밀물
  });
}else{
  // 폴백: slackH(간조) 기준 2개 전환점
  transitions.push({h:slackH+PHASE_LAG, toDir:flD, toLabel:'밀물'}); // 간조 후 → 밀물
  transitions.push({h:slackH+PHASE_LAG+6.2, toDir:ebD, toLabel:'썰물'}); // 만조 후 → 썰물
}
transitions.sort((a,b)=>a.h-b.h);
// 첫 전환점 이전 시간대를 위한 가상 전환점 추가
// 첫 전환이 썰물(70°)이면 그 전에는 밀물(250°)이었음
if(transitions.length>0){
  const firstDir=transitions[0].toDir;
  const prevDir=firstDir===flD?ebD:flD;
  const prevLabel=firstDir===flD?'썰물':'밀물';
  transitions.unshift({h:0, toDir:prevDir, toLabel:prevLabel});
}
// 마지막 전환 이후를 위한 가상 전환점
if(transitions.length>1){
  const lastDir=transitions[transitions.length-1].toDir;
  transitions.push({h:24, toDir:lastDir, toLabel:transitions[transitions.length-1].toLabel});
}

// 물돌이 지속시간 (물세기에 따라)

const slackDuration=Math.max(0.5, 4*(1-tideStr)); // 0.5~4시간

for(let i=0;i<totalSteps;i++){const h=fishS+i/6,ts=FM(h);let wd=wF,ws=wSp;if(gfs){const hi=Math.floor(h)-fishS,hf=h-Math.floor(h);if(hi>=0&&hi<gfs.d.length){const nx=Math.min(hi+1,gfs.d.length-1);wd=gfs.d[hi]+(gfs.d[nx]-gfs.d[hi])*hf;ws=gfs.s[hi]+(gfs.s[nx]-gfs.s[hi])*hf;}}let cd,cs,ph;

  // KHOA 공식 조류 데이터 사용 (시간 보간)
  let p0=khoaCurrent[0],p1=khoaCurrent[1];
  for(let k=0;k<khoaCurrent.length-1;k++){if(khoaCurrent[k].h<=h&&khoaCurrent[k+1].h>h){p0=khoaCurrent[k];p1=khoaCurrent[k+1];break;}if(k===khoaCurrent.length-2){p0=khoaCurrent[k];p1=khoaCurrent[k+1];}}

  const dToFl=Math.abs(((cd-flD+180)%360)-180);
  const dToEb=Math.abs(((cd-ebD+180)%360)-180);

}else{
  // 폴백: 전환점 기반 조류 모델
  // 현재 시각이 어느 전환점 사이에 있는지 찾기
  let prevTr=transitions[transitions.length-1]; // 이전 전환
  let nextTr=transitions[0]; // 다음 전환
  for(let t=0;t<transitions.length;t++){
    if(transitions[t].h>h){nextTr=transitions[t];break;}
    prevTr=transitions[t];
    nextTr=transitions[(t+1)%transitions.length];
  }
  
  const dtToNext=nextTr.h-h;
  const dtFromPrev=h-prevTr.h;
  const halfSlack=slackDuration/2;
  
  if(dtToNext<=halfSlack&&dtToNext>=0){
    // 다음 전환 직전 = 물돌이 진입
    const progress=1-dtToNext/halfSlack; // 0→1

    cs=cMax*tideStr*Math.max(0,(1-progress)*0.3);

  }else if(dtFromPrev<=halfSlack&&dtFromPrev>=0){

  }else if(dtFromPrev>halfSlack){

    cd=prevTr.toDir;
    const segLen=(nextTr.h-prevTr.h)||6.2;

  }else{
    // 전환 전 본류 구간 (이전 방향 유지)
    cd=prevTr.toDir;
    cs=cMax*tideStr*0.3;

let isDrifting=true; // true=풍 넣은 상태(표류), false=풍 뺀 상태(이동/너부리)
let segNum=0;
const TRK_KEY='drift_track_'+new Date().toISOString().slice(0,10);

function toggleTrack(){
  if(trkActive){stopTrack();}
  else{startTrack();}
}

function toggleDrift(){
  isDrifting=!isDrifting;
  const btn=document.getElementById('driftBtn');
  if(isDrifting){
    btn.textContent='🪂 표류중(풍)';btn.style.background='var(--c)';
    segNum++;
    // Mark segment start
    trkData.push({type:'segment',mode:'drift',seg:segNum,ts:new Date().toISOString()});
  }else{
    btn.textContent='🚤 너부리(이동)';btn.style.background='var(--wa)';
    segNum++;
    trkData.push({type:'segment',mode:'transit',seg:segNum,ts:new Date().toISOString()});
  }
  try{localStorage.setItem(TRK_KEY,JSON.stringify(trkData));localStorage.setItem('trk_drifting',isDrifting?'1':'0');}catch(e){}
  document.getElementById('trkSt').textContent=(isDrifting?'🪂표류':'🚤이동')+' '+trkData.filter(p=>p.type!=='segment').length+'pts';
}

function startTrack(){
  if(!navigator.geolocation){alert('GPS를 사용할 수 없습니다');return;}
  trkActive=true;isDrifting=true;segNum=0;
  const btn=document.getElementById('trkBtn');
  btn.textContent='⏹ 기록중';btn.style.background='#ff4444';
  const db=document.getElementById('driftBtn');
  db.style.display='inline-flex';document.getElementById('slackBtn').style.display='inline-flex';db.textContent='🪂 표류중(풍)';db.style.background='var(--c)';
  const st=document.getElementById('trkSt');
  // Load existing
  try{const saved=localStorage.getItem(TRK_KEY);if(saved)trkData=JSON.parse(saved);}catch(e){}
  trkData.push({type:'segment',mode:'drift',seg:0,ts:new Date().toISOString()});
  st.textContent='🪂표류 0pts';st.style.color='var(--w)';
  // 기록 상태 저장 (브라우저 재시작시 복원용)
  localStorage.setItem('trk_active','1');
  supaStartSession();
  localStorage.setItem('trk_drifting',isDrifting?'1':'0');
  // Wake Lock: 화면 꺼짐 방지
  acquireWakeLock();
  startGPSWatch();
}

let wakeLock=null;
async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      console.log('Wake Lock 획득 — 화면 유지');
      wakeLock.addEventListener('release',()=>{console.log('Wake Lock 해제');});
    }
  }catch(e){console.log('Wake Lock 불가:',e);}
}

function startGPSWatch(){
  if(trkWatchId!==null)navigator.geolocation.clearWatch(trkWatchId);
  trkWatchId=navigator.geolocation.watchPosition(pos=>{
    const pt={
      lat:pos.coords.latitude,
      lon:pos.coords.longitude,
      ts:new Date().toISOString(),
      spd:pos.coords.speed,
      hdg:pos.coords.heading,
      acc:pos.coords.accuracy,
      mode:isDrifting?'drift':'transit'
    };
    trkData.push(pt);
    saveTrkData();
    supaUploadPoint(pt);
    const dPts=trkData.filter(p=>p.mode==='drift').length;
    const tPts=trkData.filter(p=>p.mode==='transit').length;
    document.getElementById('trkSt').textContent=(isDrifting?'🪂표류':'🚤이동')+' 표류'+dPts+'/이동'+tPts+' ('+pt.acc.toFixed(0)+'m)';
    drawTrackLine();
  },err=>{
    document.getElementById('trkSt').textContent='❌ '+err.message+' (재시도중)';
    // GPS 실패시 3초 후 재시도
    setTimeout(()=>{if(trkActive)startGPSWatch();},3000);
  },{enableHighAccuracy:true,maximumAge:3000,timeout:30000});
}

function saveTrkData(){
  try{
    localStorage.setItem(TRK_KEY,JSON.stringify(trkData));
    localStorage.setItem('trk_last_save',new Date().toISOString());
  }catch(e){
    // localStorage 용량 초과시 오래된 포인트 제거
    if(trkData.length>5000){trkData=trkData.slice(-4000);}
    try{localStorage.setItem(TRK_KEY,JSON.stringify(trkData));}catch(e2){}
  }
}

// 페이지 숨김/표시 시 GPS 재시작 + Wake Lock 재획득
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&trkActive){
    startGPSWatch();
    acquireWakeLock();
    console.log('페이지 복귀 — GPS 재시작');
  }
});

function stopTrack(){
  trkActive=false;
  if(trkWatchId!==null){navigator.geolocation.clearWatch(trkWatchId);trkWatchId=null;}
  // Wake Lock 해제
  if(wakeLock){try{wakeLock.release();wakeLock=null;}catch(e){}}
  // 기록 상태 제거
  localStorage.removeItem('trk_active');
  localStorage.removeItem('trk_drifting');
  const btn=document.getElementById('trkBtn');
  btn.textContent='🔴 항적기록';btn.style.background='var(--w)';
  document.getElementById('driftBtn').style.display='none';document.getElementById('slackBtn').style.display='none';
  const pts=trkData.filter(p=>p.type!=='segment');
  const dPts=pts.filter(p=>p.mode==='drift').length;
  const tPts=pts.filter(p=>p.mode==='transit').length;
  const st=document.getElementById('trkSt');
  st.textContent='⏹ 표류'+dPts+'/이동'+tPts+' 저장됨';st.style.color='var(--c)';
  if(pts.length>0){
    if(confirm('항적 저장 완료!\n표류 '+dPts+'pts / 이동 '+tPts+'pts\n\nGPX 파일로 다운로드?')){downloadGPX();}
  }
}

function drawTrackLine(){
  if(trkLine2)M.removeLayer(trkLine2);
  trkMarkers2.forEach(m=>M.removeLayer(m));trkMarkers2=[];
  const pts=trkData.filter(p=>p.type!=='segment');
  if(pts.length<2)return;
  // Draw drift=magenta, transit=gray dashed
  let prevMode=null,seg=[];
  pts.forEach((p,i)=>{
    if(prevMode!==null&&p.mode!==prevMode&&seg.length>1){
      const col=prevMode==='drift'?'#ff44ff':'#888888';
      const dash=prevMode==='transit'?'6,4':null;
      const ln=L.polyline(seg,{color:col,weight:prevMode==='drift'?3:2,opacity:.8,dashArray:dash}).addTo(M);
      trkMarkers2.push(ln);
      seg=[seg[seg.length-1]]; // keep last for connection
    }
    seg.push([p.lat,p.lon]);prevMode=p.mode;
  });
  if(seg.length>1){
    const col=prevMode==='drift'?'#ff44ff':'#888888';
    const dash=prevMode==='transit'?'6,4':null;
    const ln=L.polyline(seg,{color:col,weight:prevMode==='drift'?3:2,opacity:.8,dashArray:dash}).addTo(M);
    trkMarkers2.push(ln);
  }
  // Latest point
  const last=pts[pts.length-1];
  const mk=L.circleMarker([last.lat,last.lon],{radius:6,fillColor:last.mode==='drift'?'#ff44ff':'#888',fillOpacity:1,color:'#fff',weight:2}).addTo(M);
  trkMarkers2.push(mk);
  // Drift start points (segment markers)
  trkData.filter(p=>p.type==='segment'&&p.mode==='drift').forEach(s=>{
    const nextPt=trkData.find(p=>p.type!=='segment'&&p.ts>=s.ts);
    if(nextPt){
      const mk2=L.marker([nextPt.lat,nextPt.lon],{icon:L.divIcon({className:'',html:'<div style="font-size:12px">🪂</div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(M);
      trkMarkers2.push(mk2);
    }
  });
}


// ===== 히트/물돌이 기록 =====
let hitLog=[],slackLog=[];
function recordHit(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const entry={ts:new Date().toISOString(),lat:pos.coords.latitude,lon:pos.coords.longitude,mode:isDrifting?'drift':'transit'};
    hitLog.push(entry);
    try{localStorage.setItem('hits_'+new Date().toISOString().slice(0,10),JSON.stringify(hitLog));}catch(e){}
    document.getElementById('trkSt').textContent='🐟 히트 #'+hitLog.length+' 기록!';
  },()=>{
    hitLog.push({ts:new Date().toISOString(),lat:0,lon:0});
    document.getElementById('trkSt').textContent='🐟 히트 #'+hitLog.length+' (GPS없음)';
  },{enableHighAccuracy:true,timeout:5000});
}
function recordSlack(){
  const entry={ts:new Date().toISOString()};
  slackLog.push(entry);
  try{localStorage.setItem('slacks_'+new Date().toISOString().slice(0,10),JSON.stringify(slackLog));}catch(e){}
  document.getElementById('trkSt').textContent='🔄 물돌이 기록! '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

function downloadGPX(){
  const date=new Date().toISOString().slice(0,10);
  const pts=trkData.filter(p=>p.type!=='segment');
  let gpx='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="선진입계산기">\n';
  let cm=null;
  pts.forEach(pt=>{
    if(pt.mode!==cm){if(cm!==null)gpx+='</trkseg></trk>\n';cm=pt.mode;gpx+='<trk><n>'+(cm==='drift'?'표류':'이동')+'_'+date+'</n><trkseg>\n';}
    gpx+=`<trkpt lat="${pt.lat}" lon="${pt.lon}"><time>${pt.ts}</time>`;
    if(pt.spd!=null)gpx+=`<speed>${pt.spd}</speed>`;
    gpx+=`<desc>${pt.mode}</desc></trkpt>\n`;
  });
  if(cm!==null)gpx+='</trkseg></trk>\n';
  gpx+='</gpx>';
  const blob=new Blob([gpx],{type:'application/gpx+xml'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='항적_'+date+'.gpx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Also save raw JSON
function downloadJSON(){
  const blob=new Blob([JSON.stringify({
    date:new Date().toISOString().slice(0,10),
    point:{lat:pLat,lon:pLon},
    trackPoints:trkData,
    settings:{
      windDir:+document.getElementById('wD').value,
      windSpd:+document.getElementById('wS').value,
      floodDir:+document.getElementById('fD').value,
      ebbDir:+document.getElementById('eD').value,
      curMax:+document.getElementById('cM').value,
      anchor:document.getElementById('aY').value==='1',
      tonnage:document.getElementById('aS').value
    }
  },null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='항적데이터_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// Auto-restore track on load
window.addEventListener('load',()=>{
  initMap();
  // 이전 데이터 복원
  try{const saved=localStorage.getItem(TRK_KEY);if(saved){trkData=JSON.parse(saved);if(trkData.length>0){
    const pts=trkData.filter(p=>p.type!=='segment');
    document.getElementById('trkSt').textContent='💾 이전기록 '+pts.length+'pts';drawTrackLine();
  }}}catch(e){}
  // 기록 중이었으면 자동 재시작
  if(localStorage.getItem('trk_active')==='1'){
    trkActive=true;
    isDrifting=localStorage.getItem('trk_drifting')!=='0';
    const btn=document.getElementById('trkBtn');
    btn.textContent='⏹ 기록중';btn.style.background='#ff4444';
    const db=document.getElementById('driftBtn');
    db.style.display='inline-flex';document.getElementById('slackBtn').style.display='inline-flex';
    db.textContent=isDrifting?'🪂 표류중(풍)':'🚤 너부리(이동)';
    db.style.background=isDrifting?'var(--c)':'var(--wa)';
    acquireWakeLock();
    startGPSWatch();
    document.getElementById('trkSt').textContent='🔄 기록 재시작 ('+trkData.filter(p=>p.type!=='segment').length+'pts 복원)';
    supaStartSession().then(()=>supaUploadBatch(trkData));
  }
});

// ===== SUPABASE 실시간 저장 =====
const SUPA_URL='https://tzlxmildqbrwjcxneozb.supabase.co';
const SUPA_KEY='sb_publishable_O7sIagfFOcRUaKUyF7aLMQ_Kn67_WdC';
let supaSessionId=null;

function supaHeaders(){
  return {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=minimal'};
}

async function supaStartSession(){
  supaSessionId='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  try{
    await fetch(SUPA_URL+'/rest/v1/track_sessions',{
      method:'POST',headers:supaHeaders(),
      body:JSON.stringify({id:supaSessionId,point_name:sN,lat:pLat,lon:pLon,
        wind_dir:+document.getElementById('wD').value||0,
        wind_spd:+document.getElementById('wS').value||0,
        tide_info:document.getElementById('tCS')?.textContent||'',
        notes:'auto'})
    });
    console.log('Supabase session started:',supaSessionId);
  }catch(e){console.log('Supabase session failed:',e);}
}

async function supaUploadPoint(pt){
  if(!supaSessionId)return;
  try{
    await fetch(SUPA_URL+'/rest/v1/track_points',{
      method:'POST',headers:supaHeaders(),
      body:JSON.stringify({session_id:supaSessionId,ts:pt.ts,lat:pt.lat,lon:pt.lon,
        spd:pt.spd||0,hdg:pt.hdg||0,acc:pt.acc||0,mode:pt.mode||'drift'})
    });
  }catch(e){console.log('Supabase upload failed:',e);}
}

// 배치 업로드 (오프라인 복구용)
async function supaUploadBatch(points){
  if(!supaSessionId||!points.length)return;
  const rows=points.filter(p=>p.type!=='segment').map(p=>({
    session_id:supaSessionId,ts:p.ts,lat:p.lat,lon:p.lon,
    spd:p.spd||0,hdg:p.hdg||0,acc:p.acc||0,mode:p.mode||'drift'
  }));
  try{
    await fetch(SUPA_URL+'/rest/v1/track_points',{
      method:'POST',headers:supaHeaders(),
      body:JSON.stringify(rows)
    });
    console.log('Batch uploaded:',rows.length,'points');
  }catch(e){console.log('Batch upload failed:',e);}
}
